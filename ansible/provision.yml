---
- name: Provision Soulcuts production VPS
  hosts: soulcuts
  become: true
  gather_facts: true

  vars:
    deploy_user: deploy
    app_root: /opt/soulcuts
    ssh_port: 22
    docker_arch_map:
      x86_64: amd64
      aarch64: arm64
      armv7l: armhf
    docker_arch: "{{ docker_arch_map.get(ansible_architecture, 'amd64') }}"
    docker_distribution: "{{ ansible_distribution | lower }}"

  handlers:
    - name: restart ssh
      ansible.builtin.service:
        name: ssh
        state: restarted

  tasks:
    - name: Ensure supported OS family
      ansible.builtin.assert:
        that:
          - ansible_os_family == "Debian"
        fail_msg: "This playbook supports Ubuntu/Debian hosts."

    - name: Require deploy SSH public key
      ansible.builtin.assert:
        that:
          - deploy_ssh_public_key is defined
          - deploy_ssh_public_key | length > 0
        fail_msg: "Pass --extra-vars \"deploy_ssh_public_key='$(cat ~/.ssh/id_ed25519.pub)'\" to avoid locking yourself out."

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - fail2ban
          - gnupg
          - openssh-server
          - python3
          - rsync
          - ufw
        state: present
        update_cache: true

    - name: Create apt keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Install Docker apt signing key
      ansible.builtin.get_url:
        url: "https://download.docker.com/linux/{{ docker_distribution }}/gpg"
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ docker_arch }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ docker_distribution }} {{ ansible_distribution_release }} stable"
        filename: docker
        state: present
        update_cache: true

    - name: Install Docker Engine and Compose plugin
      ansible.builtin.apt:
        name:
          - containerd.io
          - docker-buildx-plugin
          - docker-ce
          - docker-ce-cli
          - docker-compose-plugin
        state: present

    - name: Ensure Docker service is enabled
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started

    - name: Create deploy user
      ansible.builtin.user:
        name: "{{ deploy_user }}"
        shell: /bin/bash
        groups: docker
        append: true
        create_home: true

    - name: Install deploy SSH public key
      ansible.posix.authorized_key:
        user: "{{ deploy_user }}"
        key: "{{ deploy_ssh_public_key }}"
        state: present
      when: deploy_ssh_public_key is defined

    - name: Create application directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ app_root }}", mode: "0755" }
        - { path: "{{ app_root }}/releases", mode: "0755" }
        - { path: "{{ app_root }}/env", mode: "0750" }
        - { path: "{{ app_root }}/backups", mode: "0750" }
        - { path: "{{ app_root }}/data", mode: "0750" }
        - { path: "{{ app_root }}/data/uploads", mode: "0750" }

    - name: Configure UFW defaults
      community.general.ufw:
        direction: "{{ item.direction }}"
        policy: "{{ item.policy }}"
      loop:
        - { direction: incoming, policy: deny }
        - { direction: outgoing, policy: allow }

    - name: Allow SSH
      community.general.ufw:
        rule: allow
        port: "{{ ssh_port }}"
        proto: tcp

    - name: Allow HTTP and HTTPS
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "80"
        - "443"

    - name: Enable UFW
      community.general.ufw:
        state: enabled

    - name: Disable SSH password authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication\\s+"
        line: "PasswordAuthentication no"
        validate: "/usr/sbin/sshd -t -f %s"
      notify: restart ssh

    - name: Disable SSH keyboard-interactive authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?KbdInteractiveAuthentication\\s+"
        line: "KbdInteractiveAuthentication no"
        validate: "/usr/sbin/sshd -t -f %s"
      notify: restart ssh

    - name: Disable root SSH login
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PermitRootLogin\\s+"
        line: "PermitRootLogin no"
        validate: "/usr/sbin/sshd -t -f %s"
      notify: restart ssh
