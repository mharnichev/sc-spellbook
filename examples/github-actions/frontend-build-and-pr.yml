name: Build frontend images and update infra

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint Nuxt apps
        run: |
          pnpm --filter @apps/barbershop lint
          pnpm --filter @apps/blog lint
          pnpm --filter @apps/backoffice lint

      - name: Build Nuxt apps
        run: |
          pnpm --filter @apps/barbershop build
          NUXT_APP_BASE_URL=/blog/ NUXT_PUBLIC_BLOG_SITE_URL=https://soulcuts.com.ua/blog pnpm --filter @apps/blog build
          pnpm --filter @apps/backoffice build

      - name: Set image tags
        run: |
          echo "PUBLIC_SITE_IMAGE=ghcr.io/${GITHUB_REPOSITORY}/public-site:${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "BLOG_IMAGE=ghcr.io/${GITHUB_REPOSITORY}/blog:${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "ADMIN_APP_IMAGE=ghcr.io/${GITHUB_REPOSITORY}/admin:${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push public site
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/barbershop/Dockerfile
          push: true
          tags: |
            ${{ env.PUBLIC_SITE_IMAGE }}
            ghcr.io/${{ github.repository }}/public-site:main
          cache-from: type=gha,scope=public-site
          cache-to: type=gha,mode=max,scope=public-site

      - name: Build and push blog
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/blog/Dockerfile
          push: true
          tags: |
            ${{ env.BLOG_IMAGE }}
            ghcr.io/${{ github.repository }}/blog:main
          build-args: |
            NUXT_APP_BASE_URL=/blog/
            NUXT_PUBLIC_BLOG_SITE_URL=https://soulcuts.com.ua/blog
          cache-from: type=gha,scope=blog
          cache-to: type=gha,mode=max,scope=blog

      - name: Build and push admin app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backoffice/Dockerfile
          push: true
          tags: |
            ${{ env.ADMIN_APP_IMAGE }}
            ghcr.io/${{ github.repository }}/admin:main
          cache-from: type=gha,scope=admin-app
          cache-to: type=gha,mode=max,scope=admin-app

      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: mharnichev/sc-spellbook
          token: ${{ secrets.INFRA_REPO_PAT }}
          path: infra

      - name: Update production image versions
        working-directory: infra
        run: |
          sed -i "s|^PUBLIC_SITE_IMAGE=.*|PUBLIC_SITE_IMAGE=${PUBLIC_SITE_IMAGE}|" versions/production.env
          sed -i "s|^BLOG_IMAGE=.*|BLOG_IMAGE=${BLOG_IMAGE}|" versions/production.env
          sed -i "s|^ADMIN_APP_IMAGE=.*|ADMIN_APP_IMAGE=${ADMIN_APP_IMAGE}|" versions/production.env

      - name: Open infra PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.INFRA_REPO_PAT }}
          path: infra
          branch: release/frontend-${{ env.SHORT_SHA }}
          commit-message: "chore: release frontend ${{ env.SHORT_SHA }}"
          title: "Release frontend ${{ env.SHORT_SHA }}"
          body: |
            Updates production frontend images:

            - Public site: `${{ env.PUBLIC_SITE_IMAGE }}`
            - Blog: `${{ env.BLOG_IMAGE }}`
            - Admin app: `${{ env.ADMIN_APP_IMAGE }}`

            Merge this PR to deploy production from the infra repo.
