name: Build backend image and update infra

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest

      - name: Set image tag
        run: |
          echo "BACKEND_IMAGE=ghcr.io/${GITHUB_REPOSITORY}/api:${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}
            ghcr.io/${{ github.repository }}/api:main
          cache-from: type=gha,scope=backend-api
          cache-to: type=gha,mode=max,scope=backend-api

      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: mharnichev/sc-spellbook
          token: ${{ secrets.INFRA_REPO_PAT }}
          path: infra

      - name: Update production image version
        working-directory: infra
        run: sed -i "s|^BACKEND_IMAGE=.*|BACKEND_IMAGE=${BACKEND_IMAGE}|" versions/production.env

      - name: Open infra PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.INFRA_REPO_PAT }}
          path: infra
          branch: release/backend-${{ env.SHORT_SHA }}
          commit-message: "chore: release backend ${{ env.SHORT_SHA }}"
          title: "Release backend ${{ env.SHORT_SHA }}"
          body: |
            Updates production backend image:

            - API: `${{ env.BACKEND_IMAGE }}`

            Merge this PR to deploy production from the infra repo.

